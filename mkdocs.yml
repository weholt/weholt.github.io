site_name: Weholt.org
site_url: https://weholt.github.io/
repo_url: https://github.com/weholt/
docs_dir: src
site_dir: docs/lab
author: Thomas Weholt
author_email: thomas@weholt.org

extra_css:
  - style.css
  
nav:
- The Lab: index.md
- The Story / Resumè: resume.md
- Thoughts on Licensing: license.md
- Today I Learned: til.md

#- Blog:
#    - blog/index.md
  
theme:
  name: material
  features:
    - navigation.expand
    - navigation.top
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-5
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-3
        name: Switch to light mode

plugins:
- search
- tags
- blog:
    blog_dir: .
    blog_toc: true
- rss:
      match_path: blog/posts/.* 
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags 

markdown_extensions:
  - admonition
  - mkautodoc
  - pymdownx.superfences
  - attr_list  
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
